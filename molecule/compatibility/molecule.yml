---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: ubuntu-compat
    image: docker.io/pycontribs/ubuntu:latest
    pre_build_image: true

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_ROLES_PATH: /opt

verifier:
  name: ansible

scenario:
  test_sequence:
    - destroy
    - dependency
    - syntax
    - create
    - converge
    - verify
    - destroy
