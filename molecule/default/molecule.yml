---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml

driver:
  name: default

platforms:
  - name: oraclelinux8
    image: oraclelinux:8
    groups:
      - molecule
  - name: ubuntu
    image: ubuntu:latest
    groups:
      - molecule

provisioner:
  name: ansible
  log: true
  env:
    ANSIBLE_ROLES_PATH: /home/asc/ansible-hw

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - create
    - converge
    - verify
    - destroy
